### model
model_name_or_path: zwhe99/DeepMath-1.5B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all
deepspeed: examples/deepspeed/ds_z2_config.json  # Use ZeRO stage 2 for dual GPU

### dataset
dataset: conceptandquiz_sft
template: llama3  # DeepMath-1.5B likely uses llama3 template
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/deepmath-1.5b/lora/conceptandquiz-sft
logging_steps: 10
save_steps: 50
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 4  # Increased for smaller 1.5B model
gradient_accumulation_steps: 15  # effective batch = 4*15*2 = 120
learning_rate: 5.0e-5
num_train_epochs: 15.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
val_size: 0.1
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 50